<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rizma AI</title>
    <link rel="icon" type="image/x-icon" href="/icons/rizma/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/rizma/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/rizma/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/rizma/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 80px auto;
        padding: 0 24px;
        line-height: 1.5;
      }
      .heading {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 12px;
      }
      .heading img {
        width: 52px;
        height: 52px;
      }
      h1 { font-size: 42px; margin: 0; }
      p { font-size: 20px; color: #444; }
      .tagline { font-size: 26px; }
      .sub { font-size: 20px; }
      a { color: inherit; }
      .contact { font-size: 14px; color: #888; }
      .brief-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .brief-link-name {
        font-family: 'Playfair Display', serif;
        font-weight: 600;
        font-size: 20px;
        color: #1A1A1A;
      }
      .brief-link-arrow {
        color: #6B47FF;
        font-weight: 600;
      }
      .brief-link img {
        width: 22px;
        height: 22px;
      }
    </style>
  </head>
  <body>
    <div class="heading">
      <img src="/icons/rizma/apple-touch-icon.png" alt="Rizma AI" />
      <h1>Rizma AI</h1>
    </div>
    <p class="tagline">Building products for a calmer, more empathetic world.</p>
    <p class="sub">Introducing Rizma Brief — Stay informed without the overwhelm.</p>
    <p>
      <a class="brief-link" href="/brief">
        <img src="/icons/rizma-brief/apple-touch-icon.png" alt="Rizma Brief" />
        <span class="brief-link-name">Rizma Brief</span>
        <span class="brief-link-arrow">→</span>
      </a>
    </p>
    <p class="contact"><a href="mailto:michal@rizma.ai">michal@rizma.ai</a></p>
  </body>
</html>
